<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Dashboard Professional v2 - Single Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #AEC6CF; --success: #77DD77; --danger: #FFB7B2;
            --warning: #FDFD96; --bg: #fdfdfd; --white: #ffffff;
            --text: #4a4a4a; --shadow: 0 8px 30px rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        
        /* ล็อกความสูงหน้าจอ */
        body { 
            background: var(--bg); 
            color: var(--text); 
            display: grid; 
            grid-template-columns: 240px 1fr; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .sidebar { background: var(--white); padding: 2rem 1.5rem; border-right: 1px solid #f0f0f0; }
        
        /* ส่วนเนื้อหาหลักใช้ Flexbox แนวตั้ง */
        .content { 
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 2rem;
            gap: 1rem;
            overflow: hidden;
        }
        
        header { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        /* ปรับขนาด Stat Grid ให้เล็กลงเล็กน้อย */
        .stat-grid { 
            flex: 0 0 auto;
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 1rem; 
        }
        .card { 
            background: var(--white); padding: 0.8rem; border-radius: 15px; 
            box-shadow: var(--shadow); border: 1px solid #f9f9f9; text-align: center;
        }
        .card small { font-size: 0.75rem; color: var(--muted); }
        .card-val { font-size: 1.4rem; font-weight: 600; color: #5a5a5a; }
        
        /* ส่วนของกราฟจะขยายตัวเต็มพื้นที่ที่เหลือ */
        .charts-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0; /* สำคัญเพื่อให้ flex item หดตัวได้ */
        }

        .chart-main-grid { 
            flex: 1.2; /* สัดส่วนแถวบน */
            display: grid; 
            grid-template-columns: 1.5fr 1fr; 
            gap: 1rem; 
            min-height: 0;
        }

        .chart-card { 
            background: var(--white); 
            padding: 1rem; 
            border-radius: 15px; 
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .chart-card h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
        .chart-card canvas { flex: 1; width: 100% !important; height: 100% !important; }

        .histogram-section {
            flex: 0.8; /* สัดส่วนแถวล่าง */
            min-height: 0;
        }

        #loader { position: fixed; inset: 0; background: var(--white); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader"><div><i class="fas fa-circle-notch fa-spin fa-2x"></i></div></div>

<aside class="sidebar">
    <h2 style="color:var(--primary);"><i class="fas fa-notes-medical"></i> Dashboard</h2>
    <div style="margin-top:2rem; color:#ccc; font-size: 0.8rem;">MENU</div>
    <div style="color:var(--primary); font-weight:500; font-size: 0.9rem;"><i class="fas fa-th-large"></i> Overview Analysis</div>
</aside>

<main class="content">
    <header>
        <h2>วิเคราะห์สถิติชาร์ทผู้ป่วย</h2>
        <select id="monthSelect" onchange="updateView()" style="padding:5px 12px; border-radius:8px; border:1px solid #eee; font-size: 0.9rem;">
            <option value="all">ทุกเดือน</option>
        </select>
    </header>

    <div class="stat-grid">
        <div class="card"><small>ผู้ป่วยรวม</small><div class="card-val" id="stat-total">-</div></div>
        <div class="card"><small>ครบกำหนดส่ง</small><div class="card-val" id="stat-due">-</div></div>
        <div class="card"><small>ยังไม่
