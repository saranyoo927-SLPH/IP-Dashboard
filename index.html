<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS เหมือนเดิมจากคำตอบที่แล้ว */
        :root { --primary-blue: #2563eb; --bg-color: #f8fafc; --card-bg: #ffffff; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-color); display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background-color: var(--card-bg); padding: 2rem; box-shadow: 2px 0 10px rgba(0,0,0,0.03); }
        .main-content { padding: 2rem 3rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 4px solid var(--primary-blue); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .stat-value { font-size: 1.8rem; font-weight: 600; display: block; margin-top: 5px; }
        .charts-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; }
        .chart-container { background: white; padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div><i class="fas fa-spinner fa-spin"></i> กำลังดึงข้อมูลจาก Google Sheets...</div>
    </div>

    <aside class="sidebar">
        <h2 style="color:var(--primary-blue); margin-bottom:2rem;"><i class="fa-solid fa-notes-medical"></i> MedReport</h2>
        <p style="color:var(--text-muted)">Dashboard เชื่อมต่อ Real-time</p>
    </aside>

    <main class="main-content">
        <header style="margin-bottom:2rem">
            <h1>แดชบอร์ดสรุปสถิติชาร์ทผู้ป่วย</h1>
            <p id="update-time">ข้อมูลดึงตรงจากสเปรดชีต</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span style="color:var(--text-muted)">1. จำนวนผู้ป่วยทั้งหมด</span>
                <span class="stat-value" id="totalPatients">-</span>
            </div>
            <div class="stat-card" style="border-left-color: #10b981;">
                <span style="color:var(--text-muted)">2. ครบกำหนดส่งแล้ว</span>
                <span class="stat-value" id="dueSent">-</span>
            </div>
            <div class="stat-card" style="border-left-color: #f59e0b;">
                <span style="color:var(--text-muted)">3. ยังไม่ครบกำหนดส่ง</span>
                <span class="stat-value" id="notDueSent">-</span>
            </div>
            <div class="stat-card" style="border-left-color: #10b981;">
                <span style="color:var(--text-muted)">4. ส่งงานประกันแล้ว</span>
                <span class="stat-value" id="insuranceSent">-</span>
            </div>
            <div class="stat-card" style="border-left-color: #ef4444;">
                <span style="color:var(--text-muted)">5. ยังไม่ส่งงานประกัน</span>
                <span class="stat-value" id="insuranceNotSent">-</span>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>จำนวนผู้ป่วยรายเดือน</h3>
                <canvas id="monthlyChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>สถานะการส่งชาร์ท</h3>
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // เรียกฟังก์ชันจากฝั่ง Server (GAS)
        window.onload = function() {
            google.script.run.withSuccessHandler(updateDashboard).getDashboardData();
        };

        function updateDashboard(stats) {
            // ซ่อน Loading
            document.getElementById('loading').style.display = 'none';

            // อัปเดตตัวเลขใน Card
            document.getElementById('totalPatients').innerText = stats.totalPatients.toLocaleString();
            document.getElementById('dueSent').innerText = stats.dueSent.toLocaleString();
            document.getElementById('notDueSent').innerText = stats.notDueSent.toLocaleString();
            document.getElementById('insuranceSent').innerText = stats.insuranceSent.toLocaleString();
            document.getElementById('insuranceNotSent').innerText = stats.insuranceNotSent.toLocaleString();

            // วาดกราฟแท่ง (Monthly)
            new Chart(document.getElementById('monthlyChart'), {
                type: 'bar',
                data: {
                    labels: stats.monthlyChart.labels,
                    datasets: [{
                        label: 'จำนวนคนไข้',
                        data: stats.monthlyChart.data,
                        backgroundColor: '#2563eb',
                        borderRadius: 5
                    }]
                }
            });

            // วาดกราฟวงกลม (Status)
            new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: ['ชาร์ททันเวลา', 'ชาร์ทช้า'],
                    datasets: [{
                        data: [stats.onTime, stats.late],
                        backgroundColor: ['#10b981', '#ef4444']
                    }]
                }
            });
        }
    </script>
</body>
</html>
