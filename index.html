<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: var(--bg); color: var(--text); display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { background: var(--white); padding: 2rem 1.5rem; border-right: 1px solid #e2e8f0; }
        .nav-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
            color: var(--muted); text-decoration: none; border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .nav-item.active { background: #eff6ff; color: var(--primary); font-weight: 600; }

        /* Content */
        .content { padding: 2rem 3rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .filter-box select { padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; font-size: 1rem;}

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: var(--white); padding: 1.5rem; border-radius: 16px; box-shadow: var(--shadow); border-bottom: 4px solid var(--primary); }
        .card-val { font-size: 1.8rem; font-weight: 600; margin-top: 5px; display: block; }
        
        .chart-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; }
        .chart-card { background: var(--white); padding: 1.5rem; border-radius: 16px; box-shadow: var(--shadow); }

        #loader { 
            position: fixed; inset: 0; background: rgba(255,255,255,0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }
    </style>
</head>
<body>

<div id="loader">
    <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i>
    <p style="margin-top:10px; font-size: 1.2rem;">กำลังดึงข้อมูล...</p>
</div>

<aside class="sidebar">
    <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary); margin-bottom: 2rem;">
        <i class="fa-solid fa-notes-medical"></i> MedDashboard
    </div>
    <div class="nav-item active"><i class="fas fa-home"></i> หน้าแรก</div>
</aside>

<main class="content">
    <div class="top-bar">
        <h1>สรุปสถิติชาร์ทผู้ป่วย</h1>
        <div class="filter-box">
            <select id="monthSelect" onchange="updateView()">
                <option value="all">ภาพรวมทั้งหมด</option>
            </select>
        </div>
    </div>

    <div class="stat-grid">
        <div class="card">
            <small style="color:var(--muted)">จำนวนผู้ป่วยทั้งหมด</small>
            <span class="card-val" id="stat-total">-</span>
        </div>
        <div class="card" style="border-color:#10b981">
            <small style="color:var(--muted)">ครบกำหนดส่งแล้ว</small>
            <span class="card-val" id="stat-due">-</span>
        </div>
        <div class="card" style="border-color:#f59e0b">
            <small style="color:var(--muted)">ยังไม่ครบกำหนดส่ง</small>
            <span class="card-val" id="stat-notDue">-</span>
        </div>
        <div class="card">
            <small style="color:var(--muted)">ส่งงานประกันแล้ว</small>
            <span class="card-val" id="stat-insSent">-</span>
        </div>
        <div class="card" style="border-color:#ef4444">
            <small style="color:var(--muted)">ยังไม่ส่งงานประกัน</small>
            <span class="card-val" id="stat-insNot">-</span>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <h3>จำนวนผู้ป่วยแยกรายเดือน</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>สถานะการส่งชาร์ท</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
</main>

<script>
    let dbData = null;
    let bChart, pChart;

    const scriptURL = 'https://script.google.com/macros/s/AKfycbxqKpxLDz2XqcVyuGHttHXFiyXz8YVZJvU5AesYW4ByeVApWq4z8ZyyzeFJnDQ7shHfqQ/exec';

    window.onload = function() {
        fetch(scriptURL)
            .then(response => response.json())
            .then(data => {
                init(data);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loader').innerHTML = '<p style="color:red;">เกิดข้อผิดพลาดในการดึงข้อมูล โปรดตรวจสอบ API</p>';
            });
    };

    function init(data) {
        dbData = data;
        document.getElementById('loader').style.display = 'none';
        
        const sel = document.getElementById('monthSelect');
        data.months.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.innerText = m;
            sel.appendChild(opt);
        });

        updateView();
    }

    function updateView() {
        const val = document.getElementById('monthSelect').value;
        const data = val === 'all' ? dbData.overall : dbData.monthlyDetails[val];
        
        document.getElementById('stat-total').innerText = (data.patients || data.total).toLocaleString();
        document.getElementById('stat-due').innerText = data.due.toLocaleString();
        document.getElementById('stat-notDue').innerText = data.notDue.toLocaleString();
        document.getElementById('stat-insSent').innerText = data.insSent.toLocaleString();
        document.getElementById('stat-insNot').innerText = data.insNotSent.toLocaleString();

        renderCharts(val, data);
    }

    function renderCharts(mode, data) {
        if (bChart) bChart.destroy();
        if (pChart) pChart.destroy();

        const barCtx = document.getElementById('barChart').getContext('2d');
        bChart = new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: mode === 'all' ? dbData.months : [mode],
                datasets: [{
                    label: 'จำนวนคนไข้',
                    data: mode === 'all' ? dbData.months.map(m => dbData.monthlyDetails[m].total) : [data.total],
                    backgroundColor: '#2563eb',
                    borderRadius: 8
                }]
            }
        });

        const pieCtx = document.getElementById('pieChart').getContext('2d');
        pChart = new Chart(pieCtx, {
            type: 'doughnut',
            data: {
                labels: ['ทันเวลา', 'ช้า'],
                datasets: [{
                    data: [data.onTime, data.late],
                    backgroundColor: ['#10b981', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }
</script>

</body>
</html>
