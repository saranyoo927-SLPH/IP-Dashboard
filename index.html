<script>
    let dbData = null;
    let bChart, pChart;

    // นำ URL ของ Google Apps Script ที่ Deploy ไว้มาใส่ตรงนี้
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxqKpxLDz2XqcVyuGHttHXFiyXz8YVZJvU5AesYW4ByeVApWq4z8ZyyzeFJnDQ7shHfqQ/exec';

    window.onload = function() {
        // ใช้ fetch API เพื่อดึงข้อมูลข้ามโดเมนมาจาก Google Apps Script
        fetch(scriptURL)
            .then(response => response.json())
            .then(data => {
                init(data);
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('loader').innerHTML = '<p style="color:red;">เกิดข้อผิดพลาดในการดึงข้อมูล</p>';
            });
    };

    function init(data) {
        dbData = data;
        document.getElementById('loader').style.display = 'none';
        
        // เติมข้อมูลลงใน Dropdown Filter
        const sel = document.getElementById('monthSelect');
        data.months.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.innerText = m;
            sel.appendChild(opt);
        });

        updateView();
    }

    function changeMenu(el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function updateView() {
        const val = document.getElementById('monthSelect').value;
        const data = val === 'all' ? dbData.overall : dbData.monthlyDetails[val];
        
        // อัปเดตตัวเลขใน Cards
        document.getElementById('stat-total').innerText = (data.patients || data.total).toLocaleString();
        document.getElementById('stat-due').innerText = data.due.toLocaleString();
        document.getElementById('stat-notDue').innerText = data.notDue.toLocaleString();
        document.getElementById('stat-insSent').innerText = data.insSent.toLocaleString();
        document.getElementById('stat-insNot').innerText = data.insNotSent.toLocaleString();

        renderCharts(val, data);
    }

    function renderCharts(mode, data) {
        if (bChart) bChart.destroy();
        if (pChart) pChart.destroy();

        const barCtx = document.getElementById('barChart').getContext('2d');
        bChart = new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: mode === 'all' ? dbData.months : [mode],
                datasets: [{
                    label: 'จำนวนคนไข้',
                    data: mode === 'all' ? dbData.months.map(m => dbData.monthlyDetails[m].total) : [data.total],
                    backgroundColor: '#2563eb',
                    borderRadius: 8
                }]
            }
        });

        const pieCtx = document.getElementById('pieChart').getContext('2d');
        pChart = new Chart(pieCtx, {
            type: 'doughnut',
            data: {
                labels: ['ทันเวลา', 'ช้า'],
                datasets: [{
                    data: [data.onTime, data.late],
                    backgroundColor: ['#10b981', '#ef4444']
                }]
            },
            options: { cutout: '70%' }
        });
    }
</script>
